<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muart Player | Premium Özgürlük</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h1>MUART PLAYER v1.0</h1>
        <p style="font-size: 0.8rem; color: #555; margin-bottom: 20px;">Kendi kurallarınla dinle.</p>

        <div class="input-group">
            <input type="text" id="yt-link" placeholder="YouTube Music linkini buraya bırak...">
            <button onclick="playMusic()">OYNAT</button>
        </div>

        <div id="player-container">
            <p id="status">Ruhun henüz sessiz...</p>
        </div>

        <div id="history-section">
            <div id="history-list"></div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
