<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Müzik Çalarım</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        input { padding: 10px; width: 80%; border-radius: 5px; border: none; }
        button { padding: 10px 20px; margin-top: 10px; background: #1db954; border: none; color: white; border-radius: 20px; cursor: pointer; }
        #player-container { margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Müzik Çalar v1.0</h1>
    <input type="text" id="yt-link" placeholder="YouTube linkini buraya yapıştır...">
    <br>
    <button onclick="playMusic()">Oynat</button>

    <div id="player-container">
        <p id="status">Henüz bir müzik seçilmedi.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
