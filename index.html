<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muart Player PRO v4</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div class="main-wrapper">
        <div class="player-section">
            <h1>MUART PLAYER PRO</h1>
            
            <div class="input-group">
                <input type="text" id="yt-link" placeholder="Playlist veya Şarkı linki...">
                <button onclick="loadMedia()" class="load-btn">YÜKLE</button>
            </div>

            <div id="player-container">
                <div id="main-player"></div>
            </div>

            <div class="controls">
                <button onclick="prevTrack()" class="ctrl-btn">&lt;&lt; GERİ</button>
                <button onclick="togglePlay()" id="play-pause-btn" class="ctrl-btn">|| DURDUR</button>
                <button onclick="nextTrack()" class="ctrl-btn">İLERİ &gt;&gt;</button>
            </div>
            
            <p id="status">Sistem hazır...</p>

            <div id="history-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 10px;">
                    <h3 style="margin: 0; color: #888; font-size: 1.2rem;">GEÇMİŞ (V9)</h3>
                    <button onclick="clearHistory()" class="clear-btn">TEMİZLE</button>
                </div>
                <div id="history-list"></div>
            </div>
        </div>

        <div class="queue-section">
            <h3 id="queue-header">SIRADAKİ LİSTE</h3>
            <div id="queue-list">
                <p style="color: #444; font-size: 0.9rem;">Playlist yüklenince burada belirecek...</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
